events {
    # Максимальна кількість одночасних з'єднань
    worker_connections 1024;
}

http {
    # Включаємо типи MIME для правильних Content-Type заголовків
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Дозволяємо файли до 10MB (наш ліміт 5MB + запас)
    client_max_body_size 10M;

    server {
        # Nginx слухає на порту 80
        listen 80;

        # Роздаємо зображення напряму через Nginx
        # Швидше ніж через Python
        location /images/ {
            alias /images/;
        }

        # Всі інші запити передаємо до Python backend
        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}