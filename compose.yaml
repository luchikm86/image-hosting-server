services:

  # ─────────────────────────────────────────────
  # Python backend
  # ─────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Монтуємо папку images з хоста в контейнер
      - ./images:/images
      # Монтуємо папку logs з хоста в контейнер
      - ./logs:/logs
    environment:
      # Передаємо змінні оточення в контейнер
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_FILE=/logs/app.log
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      # Чекаємо поки PostgreSQL буде готовий
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Відкриваємо порт для підключення з PyCharm
      - "5433:5432"
    volumes:
      # Зберігаємо дані БД між перезапусками контейнера
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # Docker перевіряє чи PostgreSQL готовий
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Nginx reverse proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      # Nginx слухає на порту 80
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      # Nginx роздає зображення напряму без Python
      - ./images:/images
    depends_on:
      - app
    restart: unless-stopped

# Іменований volume для даних PostgreSQL
# Дані живуть незалежно від контейнера
volumes:
  db_data: